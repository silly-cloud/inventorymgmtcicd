name: "📢 Notify Slack"

on:
  workflow_call:
    inputs:
      status:
        description: "Build status (success|failure|cancelled)"
        required: true
        type: string
      stage:
        description: "Pipeline stage that reported this status"
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    # Never fail the parent workflow due to Slack issues
    continue-on-error: true
    steps:
      - name: Build and send Block Kit message
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ inputs.status }}
          STAGE: ${{ inputs.stage }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          case "$STATUS" in
            success)   ICON=":white_check_mark:"; COLOR="#36a64f" ;;
            failure)   ICON=":x:";               COLOR="#dc3545" ;;
            cancelled) ICON=":warning:";          COLOR="#ffc107" ;;
            *)         ICON=":information_source:"; COLOR="#0d6efd" ;;
          esac

          SHORT_SHA="${COMMIT_SHA:0:7}"

          PAYLOAD=$(cat <<EOF
          {
            "channel": "#all-alertmanager",
            "attachments": [
              {
                "color": "${COLOR}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "${ICON} CI/CD Pipeline: ${STATUS^^}",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Stage:*\n${STAGE}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Status:*\n${STATUS}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Branch:*\n\`${BRANCH}\`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Commit:*\n\`${SHORT_SHA}\`"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*Triggered by:*\n${ACTOR}"
                      }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": {
                          "type": "plain_text",
                          "text": "View Run",
                          "emoji": true
                        },
                        "url": "${RUN_URL}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )

          HTTP_CODE=$(curl -s -o /tmp/slack_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL")

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "Slack notification failed with HTTP ${HTTP_CODE}"
            cat /tmp/slack_response.txt
            # Do NOT exit 1 — parent workflow must not be affected
          else
            echo "Slack notification sent successfully."
          fi

