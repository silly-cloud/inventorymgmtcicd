# ============================================================
# SonarQube Project Configuration
# Used by Jenkins (Phase 6) — NOT by GitHub Actions.
#
# host.url and login token are injected by Jenkins via env vars:
#   -Dsonar.host.url=$SONAR_HOST_URL
#   -Dsonar.login=$SONAR_TOKEN
# Do NOT hardcode sonar.host.url or sonar.login here.
# ============================================================

sonar.projectKey=mern-inventory-cicd
sonar.projectName=MERN Inventory Management System
sonar.projectVersion=1.0

# Source directories
sonar.sources=Backend/,Frontend/inventory_management_system/src/

# Test directories
sonar.tests=Backend/__tests__/,Frontend/inventory_management_system/src/

# Test file inclusions
sonar.test.inclusions=**/__tests__/**/*.js,**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# Exclusions (node_modules, build artifacts, test files, infrastructure files)
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/build/**,\
  **/dist/**,\
  **/__tests__/**,\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.spec.js,\
  **/*.spec.jsx,\
  **/Dockerfile,\
  **/Dockerfile.*,\
  **/docker-compose*.yml,\
  **/.eslintrc*,\
  **/eslint.config.*

# Coverage report paths (lcov)
sonar.javascript.lcov.reportPaths=\
  Backend/coverage/lcov.info,\
  Frontend/inventory_management_system/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
